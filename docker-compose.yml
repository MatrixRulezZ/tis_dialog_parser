version: '3.8'
services:
  tis-bot:
    image: tis-dialog-bot
    build: .
    environment:
      - BOT_TOKEN=${BOT_TOKEN}
      - CHAT_ID=${CHAT_ID}
      - TIS_LOGIN=${TIS_LOGIN}
      - TIS_PASSWORD=${TIS_PASSWORD}
      - TIS_PAYEE_NAME=${TIS_PAYEE_NAME}
      - TIS_INN=${TIS_INN}
      - TIS_ACCOUNT=${TIS_ACCOUNT}
      - TIS_BANK_BIC=${TIS_BANK_BIC}
      - TIS_BANK_NAME=${TIS_BANK_NAME}
      - TIS_COR_ACCOUNT=${TIS_COR_ACCOUNT}

    volumes:
           - ./data:/app/data  # Монтируем папку для сохранения резервных копий
    restart: unless-stopped
